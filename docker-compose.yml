version: '3.8'

services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: ai_interview_backend
        ports:
            - '8000:8000'
        env_file:
            - ./backend/.env
        depends_on:
            - redis
        restart: always

    redis:
        image: redis:7-alpine
        container_name: ai_interview_redis
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes
        restart: always

volumes:
    redis_data:
