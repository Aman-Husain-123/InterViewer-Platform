version: '3.8'

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interview_backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: always
    volumes:
      - ./backend:/app

  # ── Celery Worker ────────────────────────────────────────────────────────
  # Processes async tasks (e.g. triggered from FastAPI endpoints)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interview_celery_worker
    command: celery -A app.core.celery worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend
    restart: always
    volumes:
      - ./backend:/app

  # ── Celery Beat ──────────────────────────────────────────────────────────
  # Scheduler: runs send_interview_reminders every hour
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interview_celery_beat
    command: celery -A app.core.celery beat --loglevel=info --scheduler celery.beat.PersistentScheduler --schedule /app/celerybeat_schedule/celerybeat-schedule
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend
    restart: always
    volumes:
      - ./backend:/app
      - celery_beat_data:/app/celerybeat_schedule

  # ── Redis (broker + result backend) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_interview_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

volumes:
  redis_data:
  celery_beat_data:
